name: pdf_tech
description: "Application de gestion de PDF - lecture, annotation, création, partage"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # PDF - visualisation et manipulation
  syncfusion_flutter_pdfviewer: ^27.1.48
  syncfusion_flutter_pdf: ^27.1.48

  # Gestion des fichiers
  file_picker: ^8.1.2
  path_provider: ^2.1.4
  permission_handler: ^11.3.1

  # Partage et email
  share_plus: ^10.0.3

  # Stockage local (fichiers récents)
  shared_preferences: ^2.3.2

  # Signature électronique
  syncfusion_flutter_signaturepad: ^27.0.0

  # Google Drive
  google_sign_in: ^6.2.1
  googleapis: ^13.2.0
  http: ^1.2.0

  # Formatage des dates
  intl: ^0.19.0

  # OCR - rendu de pages PDF en images + reconnaissance de texte
  pdfx: ^2.6.0
  google_mlkit_text_recognition: ^0.13.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  image: ^4.1.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#1565C0"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
