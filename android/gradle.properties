org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Fix bug Kotlin incremental compiler avec sources sur drives différents (C: cache, J: projet)
kotlin.incremental=false
# Défense en profondeur : config-cache désactivé au cas où le user-global
# `e:\.gradle\gradle.properties` repasserait à `true`. Workaround AGP 8.x +
# Kotlin lazy delegate (Flutter ne sérialise pas `builtInKotlinServices$delegate`).
org.gradle.configuration-cache=false
